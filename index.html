
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Medical Store</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    .product { border: 1px solid #ccc; padding: 10px; margin: 10px; width: 200px; display: inline-block; }
    .cart { border: 1px solid #999; padding: 10px; margin-top: 20px; }
    .cart-item { margin: 5px 0; }
    button { padding: 5px 10px; cursor: pointer; }
  </style>
</head>
<body>

<h1>ABC Medical Store</h1>

<!-- Products -->
<div id="products">
  <div class="product">
    <h3>Paracetamol 500mg</h3>
    <p>₹40</p>
    <button onclick="addToCart('Paracetamol 500mg', 40)">Add to Cart</button>
  </div>

  <div class="product">
    <h3>Dettol Hand Sanitizer</h3>
    <p>₹120</p>
    <button onclick="addToCart('Dettol Hand Sanitizer', 120)">Add to Cart</button>
  </div>

  <div class="product">
    <h3>N95 Mask (Pack of 10)</h3>
    <p>₹250</p>
    <button onclick="addToCart('N95 Mask (Pack of 10)', 250)">Add to Cart</button>
  </div>
</div>

<!-- Cart Section -->
<div class="cart">
  <h2>Cart</h2>
  <div id="cart-items"></div>
  <p>Total: ₹<span id="cart-total">0</span></p>
  <button onclick="placeOrder()">Place Order & Notify on WhatsApp</button>
</div>

<script>
  let cart = [];

  function addToCart(name, price) {
    const existing = cart.find(item => item.name === name);
    if (existing) {
      existing.qty += 1;
    } else {
      cart.push({ name, price, qty: 1 });
    }
    renderCart();
  }

  function renderCart() {
    const itemsEl = document.getElementById("cart-items");
    const totalEl = document.getElementById("cart-total");

    let html = "";
    let total = 0;

    cart.forEach(item => {
      const lineTotal = item.price * item.qty;
      total += lineTotal;
      html += `<div class="cart-item">
        ${item.name} x ${item.qty} = ₹${lineTotal}
      </div>`;
    });

    itemsEl.innerHTML = html || "<p>Cart is empty</p>";
    totalEl.textContent = total;
  }

      return;
